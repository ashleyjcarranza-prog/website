  <body data-page="events">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div id="site-nav"></div>

    <main id="main-content" class="container py-5 page-wrap">
      <h1 class="section-title mb-2" data-aos="fade-up">Speaking & Features</h1>
      <p class="text-muted-ui mb-4" data-aos="fade-up" data-aos-delay="60">Conference presentations, panels, and selected appearances drawn from Ashley's academic and public-facing work.</p>

      <section class="filter-bar mb-4" data-aos="fade-up" data-aos-delay="100">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label" for="filter-type">Type</label>
            <select id="filter-type" class="form-select">
              <option value="">All Types</option>
              <option value="upcoming_conference">Upcoming Conference</option>
              <option value="speaking_engagement">Speaking Engagement</option>
              <option value="past_appearance">Past Appearance</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filter-topic">Topic</label>
            <select id="filter-topic" class="form-select">
              <option value="">All Topics</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filter-year">Year</label>
            <select id="filter-year" class="form-select">
              <option value="">All Years</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filter-city">City</label>
            <select id="filter-city" class="form-select">
              <option value="">All Cities</option>
            </select>
          </div>
        </div>

      <section id="events-grid" class="row g-4" aria-live="polite"></section>

        </div>
        <div id="features-grid" class="row g-4" aria-live="polite"></div>
      </section>
