<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speaking & Features | Ashley Carranza</title>
    <meta name="description" content="Upcoming conferences, speaking engagements, and past appearances by Ashley Carranza." />
    <link rel="canonical" href="https://ashleycarranza.com/speaking-features" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div id="site-nav"></div>

    <main class="container py-5 page-wrap">
      <p class="kicker mb-1">Speaking & Features</p>
      <h1 class="section-title">Events, Conferences, and Appearances</h1>
      <p class="text-secondary">Filter by event type, topic, year, and city. Each event supports venue navigation and Google Calendar add.</p>

      <section class="filter-shell p-3 p-md-4 mb-4">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label" for="filter-type">Type</label>
            <select id="filter-type" class="form-select">
              <option value="">All Types</option>
              <option value="upcoming_conference">Upcoming Conference</option>
              <option value="speaking_engagement">Speaking Engagement</option>
              <option value="past_appearance">Past Appearance</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filter-topic">Topic</label>
            <select id="filter-topic" class="form-select">
              <option value="">All Topics</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filter-year">Year</label>
            <select id="filter-year" class="form-select">
              <option value="">All Years</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filter-city">City</label>
            <select id="filter-city" class="form-select">
              <option value="">All Cities</option>
            </select>
          </div>
        </div>
      </section>

      <section id="events-grid" class="row g-4" aria-live="polite"></section>
    </main>

    <div id="site-footer"></div>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="/assets/js/main.js"></script>
    <script defer src="/assets/js/speaking.js"></script>
  </body>
</html>
